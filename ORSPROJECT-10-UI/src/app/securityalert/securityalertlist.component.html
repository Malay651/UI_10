<style>
  .hm {
    background-image: url('assets/img/welcome.png');
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-size: cover;
    padding-top: 200px;
    padding-bottom: 175px;
  }
</style>

<app-navbar></app-navbar>

<div class="hm">
  <div class="container-fluid pb-5">

    <!-- Title -->
    <div align="center">
      <h1 class="text-dark font-weight-bold pt-3">
        <u>Security Alert List</u>
      </h1>
    </div>

    <!-- Success Message -->
    <div class="row">
      <div class="col-md-4"></div>
      <div class="col-md-4 alert alert-success alert-dismissible"
           *ngIf="!form.error && form.message">
        <button type="button" class="close" data-dismiss="alert">&times;</button>
        <h5 class="text-success text-center">{{form.message}}</h5>
      </div>
      <div class="col-md-4"></div>
    </div>

    <!-- Error Message -->
    <div class="row">
      <div class="col-md-4"></div>
      <div class="col-md-4 alert alert-danger alert-dismissible"
           *ngIf="form.error && form.message">
        <button type="button" class="close" data-dismiss="alert">&times;</button>
        <h5 class="text-danger text-center">{{form.message}}</h5>
      </div>
      <div class="col-md-4"></div>
    </div>

    <div *ngIf="form.list.length > 0">

      <!-- Search Section -->
      <div class="row mb-3">

        <div class="col-sm-2"></div>

        <div class="col-sm-2">
          <input type="text"
                 class="form-control"
                 name="threatLevel"
                 [(ngModel)]="form.searchParams.threatLevel"
                 placeholder="Enter Threat Level">
        </div>

        <div class="col-sm-2">
          <input type="text"
                 class="form-control"
                 name="sourceIp"
                 [(ngModel)]="form.searchParams.sourceIp"
                 placeholder="Enter Source IP">
        </div>

        <div class="col-sm-2">
          <select class="form-control"
                  name="status"
                  [(ngModel)]="form.searchParams.status">
            <option value="undefined">Select Status</option>
            <option value="Open">Open</option>
            <option value="Investigating">Investigating</option>
            <option value="Resolved">Resolved</option>
            <option value="Closed">Closed</option>
          </select>
        </div>

        <div class="col-sm-3">
          <button class="btn btn-primary mr-2"
                  (click)="search()">
            Search
          </button>

          <button class="btn btn-dark"
                  (click)="reset()">
            Reset
          </button>
        </div>

        <div class="col-sm-1"></div>

      </div>

      <!-- Table -->
      <div class="table-responsive mb-3">

        <table class="table table-bordered table-dark table-hover">

          <thead>
            <tr style="background-color:#8C8C8C">

              <th width="5%">
                <input type="checkbox"
                       [(ngModel)]="isMasterSel"
                       (change)="checkUncheckAll($event)">
                Select All
              </th>

              <th class="text-center">S.No</th>
              <th class="text-center">Threat Level</th>
              <th class="text-center">Source IP</th>
              <th class="text-center">Detected Time</th>
              <th class="text-center">Status</th>
              <th class="text-center">Edit</th>

            </tr>
          </thead>

          <tbody>

            <tr *ngFor="let m of form.list; let i=index"
                align="center">

              <td>
                <input type="checkbox"
                       #checkboxes
                       (change)="checklistUpdate()"
                       [id]="m.id"
                       [value]="isMasterSel">
              </td>

              <td>{{(form.pageNo * 5) + i + 1}}</td>

              <td>{{m.threatLevel}}</td>
              <td>{{m.sourceIp}}</td>

              <td>
                {{m.detectedTime | date:'dd-MM-yyyy HH:mm'}}
              </td>

              <td>{{m.status}}</td>

              <td>
                <a (click)="forward('/securityalert/' + m.id)"
                   style="cursor:pointer">
                  Edit
                </a>
              </td>

            </tr>

          </tbody>

        </table>

      </div>

      <!-- Buttons -->
      <table width="100%">
        <tr>

          <td>
            <button class="btn btn-warning"
                    (click)="previous()"
                    [disabled]="form.pageNo == 0">
              Previous
            </button>
          </td>

          <td align="center">
            <button class="btn btn-primary"
                    (click)="forward('/securityalert')">
              New
            </button>
          </td>

          <td align="center">
            <button class="btn btn-danger"
                    (click)="deleteMany()">
              Delete
            </button>
          </td>

          <td align="right">
            <button class="btn btn-warning"
                    (click)="next()"
                    [disabled]="form.nextListSize == 0">
              Next
            </button>
          </td>

        </tr>
      </table>

    </div>

    <!-- Empty State -->
    <div *ngIf="form.list.length == 0"
         class="text-center mt-4">

      <h3 class="text-danger">
        No Security Alerts Found
      </h3>

      <br>

      <button class="btn btn-primary"
              (click)="reset()">
        Back
      </button>

    </div>

  </div>
</div>

<app-footer></app-footer>
